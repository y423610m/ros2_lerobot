# PPO Configuration for SO101 Pick and Place

# Training hyperparameters
runner_class_name: "OnPolicyRunner"
num_steps_per_env: 24
save_interval: 100
empirical_normalization: True
num_iterations: 100
seed: 42

algorithm:
  class_name: "PPO"
  clip_param: 0.2
  desired_kl: 0.01
  entropy_coef: 0.0
  gamma: 0.99
  lam: 0.95
  learning_rate: 0.0003
  max_grad_norm: 1.0
  num_learning_epochs: 5
  num_mini_batches: 4
  schedule: "adaptive"
  use_clipped_value_loss: True
  value_loss_coef: 1.0

# Network architecture
policy:
  name: "ActorCritic"
  activation: "elu"
  actor_layers: [256, 256, 128]
  critic_layers: [256, 256, 128]
  initializer: "orthogonal"
  init_noise_std: 1.0

actor:
  class_name: MLPModel
  hidden_dims: [256, 256, 128]
  activation: elu
  obs_normalization: true
  distribution_cfg:
    class_name: GaussianDistribution
    init_std: 0.2
    std_type: log
    std_range:
    - 0.0004
    - 0.1

critic:
  class_name: MLPModel
  hidden_dims: [256, 256, 128]
  activation: elu
  obs_normalization: true

obs_groups:
  actor:
  - joint_pos
  - object_pos
  - target_pos


  critic:
  - joint_pos
  - joint_vel
  - ee_pos
  - ee_quat
  - object_pos
  - object_rel_pos
  - target_pos

runner:
  checkpoint: -1
  experiment_name: exp_name
  load_run: -1
  log_interval: 1
  max_iterations: max_iterations
  record_interval: -1
  resume: False
  resume_path: None
  run_name: ""

# PPO specific
ppo:
  clip_param: 0.2
  clip_value_loss: true
  value_loss_coef: 1.0
  entropy_coef: 0.01
  learning_rate: 3.0e-4
  lr_schedule: "linear"         # "constant", "linear", "cosine"
  max_grad_norm: 1.0
  num_learning_epochs: 5
  mini_batches: 4
  gamma: 0.99
  lam: 0.95
  use_clipped_value_loss: true

# Observation normalization
obs_normalization:
  enabled: true
  clip_range: 5.0

# Checkpointing
checkpoint:
  save_interval: 100            # Save every N iterations
  keep_last_k: 5                # Keep last K checkpoints
  export_onnx: false            # Export best model to ONNX. TODO fix
  model_dir: "models/"

# Logging
logging:
  tensorboard: true
  log_dir: "logs/tensorboard/"
  print_interval: 10
  save_video: false
  video_interval: 500

# Evaluation
eval:
  enabled: true
  num_episodes: 10
  eval_interval: 100
  record_video: false
