[workspace]
authors = ["yoshito.mori <y423610m@icloud.com>"]
channels = ["robostack-jazzy", "conda-forge"]
name = "ros2_lerobot"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = {cmd = "colcon build", inputs = ["src"]}
run-so101-leader = "ros2 run lerobot_robots_teleoperators lerobot_teleoperator_node --config $(ros2 pkg prefix lerobot_robots_teleoperators)/share/lerobot_robots_teleoperators/config/teleop_so101.yaml --ros-args -r __ns:=/leader"
run-so101-follower = "ros2 run lerobot_robots_robots lerobot_robot_node --config $(ros2 pkg prefix lerobot_robots_robots)/share/lerobot_robots_robots/config/robot_so101.yaml --ros-args -r __ns:=/follower"
run-leader-follower = "ros2 run lerobot_robots_teleoperators leader_follower"
# Run a TorchScript-exported mjlab vision policy on the real SO-101 arm.
# Override the checkpoint and camera device indices with env vars:
#   CKPT=path/to/policy.jit WRIST=2 TOP=0 pixi run run-so101-policy
# TEMP: zero_action:=true mimics the policy outputting all zeros (target = home
# pose) to debug the command path / unit conversion. Remove zero_action:=true
# to restore the real policy.
run-so101-policy = "bash -c 'ros2 launch lerobot_robots_bringup so101_policy.launch.py zero_action:=true checkpoint:=${CKPT:-/home/pixy/ros2_lerobot/mjlab_rl/logs/rsl_rl/so101_block_picking_vision/2026-06-03_20-21-22/policy.jit} wrist_device:=${WRIST:-2} top_device:=${TOP:-0}'"
# Launch rviz2 from an SSH/tty shell by borrowing the GNOME Wayland session's
# Xwayland display + auth cookie. The .mutter-Xwaylandauth.* suffix changes on
# each desktop login, so resolve it at runtime. Window appears on the physical
# screen. Override the display with DISP=:2 if :1 isn't yours.
rviz-wayland = "bash -c 'export DISPLAY=${DISP:-:1}; export XAUTHORITY=$(ls -t /run/user/$(id -u)/.mutter-Xwaylandauth.* 2>/dev/null | head -1); ros2 run rviz2 rviz2'"
view-so101-follower = "ros2 launch lerobot_robots_bringup view_follower.launch.py"
view-so101-leader = "ros2 launch lerobot_robots_description view_leader.launch.py"
run-gazebo-so101-follower = "ros2 launch lerobot_robots_bringup so101_gazebo.launch.py"

train-mujoco = "cd $PIXI_PROJECT_ROOT/mujoco_rl && bash -c 'uv run python train_sac.py --timesteps ${TS:-50000000}'"

tensorboard-mujoco = "pixi run tensorboard --logdir mujoco_rl/logs/ --host 0.0.0.0"
tensorboard-genesis = "pixi run tensorboard --logdir genesis_rl/logs/ --host 0.0.0.0 --port 6007"
tensorboard-mjlab = "pixi run tensorboard --logdir mjlab_rl/logs/rsl_rl --host 0.0.0.0 --port 6008"

# Train the SO-101 block-picking task. Defaults: 4096 parallel envs, 5000 iters,
# tensorboard logger. Override with env vars: NENV=2048 ITER=10000.
train-mjlab = "cd $PIXI_PROJECT_ROOT/mjlab_rl && bash -c 'uv run python scripts/train.py Mjlab-SO101-Block-Picking --env.scene.num-envs ${NENV:-4096} --agent.max-iterations ${ITER:-5000} --agent.logger tensorboard'"

# Resume from the most recent checkpoint under logs/rsl_rl/so101_block_picking/.
# mjlab defaults --agent.load-run to ".*" (regex matches all runs, picks latest).
# To target a specific run/checkpoint:
#   RUN=2026-05-29_04-23-41 CKPT=model_3.pt pixi run train-mjlab-resume
train-mjlab-resume = "cd $PIXI_PROJECT_ROOT/mjlab_rl && bash -c 'uv run python scripts/train.py Mjlab-SO101-Block-Picking --env.scene.num-envs ${NENV:-4096} --agent.max-iterations ${ITER:-5000} --agent.logger tensorboard --agent.resume True --agent.load-run ${RUN:-.*} --agent.load-checkpoint ${CKPT:-model_.*.pt}'"

# Browser-replay a trained mjlab policy via viser (binds 0.0.0.0:8080).
# Open http://<this-host>:8080 from the laptop.
#   pixi run play-mjlab-trained CKPT=mjlab_rl/logs/rsl_rl/so101_block_picking/<run>/model_5000.pt
play-mjlab-trained = "cd $PIXI_PROJECT_ROOT/mjlab_rl && bash -c 'uv run python scripts/play.py Mjlab-SO101-Block-Picking --viewer viser --checkpoint-file ${CKPT:?set CKPT=path/to/model.pt}'"
# Same but with a zero-action agent — no checkpoint needed, useful for scene inspection.
play-mjlab-zero = "cd $PIXI_PROJECT_ROOT/mjlab_rl && uv run python scripts/play.py Mjlab-SO101-Block-Picking --viewer viser --agent zero --num-envs 1 --no-terminations True"

# ----- Vision variant (Mjlab-SO101-Block-Picking-Rgb) -----
# Train from scratch with the wrist + top-down camera setup.
train-mjlab-vision = "cd $PIXI_PROJECT_ROOT/mjlab_rl && bash -c 'uv run python scripts/train.py Mjlab-SO101-Block-Picking-Rgb --env.scene.num-envs ${NENV:-4096} --agent.max-iterations ${ITER:-10000} --agent.logger tensorboard'"
# Replay the vision policy in viser.
play-mjlab-vision-trained = "cd $PIXI_PROJECT_ROOT/mjlab_rl && bash -c 'uv run python scripts/play.py Mjlab-SO101-Block-Picking-Rgb --viewer viser --checkpoint-file ${CKPT:?set CKPT=path/to/model.pt}'"
# Inspect the static vision scene (no checkpoint) — viser sidebar shows the camera feeds.
play-mjlab-vision-zero = "cd $PIXI_PROJECT_ROOT/mjlab_rl && uv run python scripts/play.py Mjlab-SO101-Block-Picking-Rgb --viewer viser --agent zero --num-envs 1 --no-terminations True"
# Same as play-mjlab-vision-zero but with a "Print camera pose" button in
# the viser GUI; click after dragging to a good view and the camera
# position / wxyz / lookat are dumped to the terminal you launched from.
play-mjlab-vision-zero-print-camera = "cd $PIXI_PROJECT_ROOT/mjlab_rl && uv run python scripts/play_print_camera.py Mjlab-SO101-Block-Picking-Rgb --viewer viser --agent zero --num-envs 1 --no-terminations True"
# Headless snapshot of both cameras → wrist_cam.png + top_cam.png in CWD.
render-mjlab-cameras = "cd $PIXI_PROJECT_ROOT/mjlab_rl && uv run python scripts/render_cameras.py"

[activation]
scripts = ["install/setup.sh"]

[activation.env]
ROS_DISTRO = "jazzy"
GZ_IP = "127.0.0.1"
IGN_IP = "127.0.0.1"
QT_X11_NO_MITSHM = "1"


[dependencies]
python = "==3.12"
ipython = ">=9.12.0,<10"
matplotlib = ">=3.10.8,<4"
ros-jazzy-desktop = ">=0.11.0,<0.12"
ros-jazzy-rviz2 = ">=14.1.19,<15"
ros-jazzy-rqt-graph = ">=1.5.6,<2"
ros-jazzy-robot-state-publisher = ">=3.3.3,<4"
ros-jazzy-joint-state-publisher-gui = ">=2.4.1,<3"
ros-jazzy-rqt-tf-tree = ">=1.0.5,<2"
urdf-parser-py = ">=0.0.4,<0.0.5"
ros-jazzy-turtlesim = ">=1.8.3,<2"
colcon-common-extensions = ">=0.3.0,<0.4"
lsb-release = ">=11.1.0,<12"
gnupg = ">=2.5.18,<3"
evdev = ">=1.9.3,<2"
setuptools = ">=71,<81"
numpy = ">=2.0,<2.3"
ros-jazzy-ros-gz = ">=1.0.19,<2"
ros-jazzy-gz-ros2-control = ">=1.2.17,<2"
ros-jazzy-joint-state-broadcaster = ">=4.37.0,<5"
ros-jazzy-joint-trajectory-controller = ">=4.37.0,<5"
ros-jazzy-ros2-control = ">=4.43.0,<5"
ros-jazzy-controller-manager = ">=4.43.0,<5"
tensorboard = ">=2.20.0,<3"

[pypi-dependencies]
lerobot = { version = ">=0.5.1, <0.6", extras = ["feetech"] }
pyrallis = ">=0.3.1"
rsl-rl-lib = ">=5.2.0, <6"
torch = ">=2.10.0, <3"
tensorboard = ">=2.20.0, <3"
numpy = "*"
pyyaml = "*"
gymnasium = ">=1.3.0, <2"

